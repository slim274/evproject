<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camel Mobility | Login</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:430px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.header{

background:#0F4C35;
padding:45px 30px;
text-align:center;
color:white;
}

.header i{
font-size:60px;
color:#F0A500;
margin-bottom:15px;
}

.header h1{

font-size:28px;
margin-bottom:10px;
}

.header p{

opacity:.8;
font-size:14px;
line-height:1.6;
}

.form{

padding:35px;
}

.group{

margin-bottom:20px;
}

.group label{

display:block;
font-size:14px;
margin-bottom:8px;
font-weight:600;
color:#555;
}

.input{

position:relative;
}

.input i{

position:absolute;
left:15px;
top:15px;
color:#888;
}

.input input{

width:100%;
padding:14px 15px 14px 45px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;
transition:.3s;
}

.input input:focus{

border-color:#0F4C35;
}

.options{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
font-size:14px;
}

.options a{

text-decoration:none;
color:#0F4C35;
font-weight:600;
}

.login-btn{

width:100%;
padding:15px;
background:#0F4C35;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{

background:#1A6B4A;
}

.register{

margin-top:25px;
text-align:center;
font-size:14px;
}

.register a{

color:#0F4C35;
font-weight:bold;
text-decoration:none;
}

.demo{

margin-top:30px;
background:#f8f8f8;
padding:15px;
border-radius:10px;
font-size:13px;
line-height:1.7;
}

.demo strong{

color:#0F4C35;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<i class="ti ti-bolt"></i>

<h1>Camel Mobility</h1>

<p>
Smart EV Charging Platform<br>
Powered by RFID, Wallet & OCPP
</p>

</div>

<div class="form">

<div class="group">

<label>Email</label>

<div class="input">

<i class="ti ti-mail"></i>

<input
type="email"
placeholder="Enter your email">

</div>

</div>

<div class="group">

<label>Password</label>

<div class="input">

<i class="ti ti-lock"></i>

<input
type="password"
placeholder="Enter your password">

</div>

</div>

<div class="options">

<label>

<input type="checkbox">

 Remember me

</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-btn">

Login

</button>

<div class="register">

Don't have an account?

<a href="register.html">

Create Account

</a>

</div>

<div class="demo">

<strong>Demo Login</strong><br>

Email:
demo@camelmobility.com

<br>

Password:
123456

</div>

</div>

</div>

</body>
</html>
